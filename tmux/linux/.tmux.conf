# ================ key binds ================ 
# TPM: I - install, U - update, M-u - remove
# Resurrect: <c-s> - save, <c-r> restore
# ===========================================

# vim style tmux config
# use C-a, since it's on the home row and easier to hit than C-b
# List of plugins
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'main'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set-option -g prefix C-a
unbind-key C-a
bind-key C-a send-prefix
set -g base-index 1

set-option -g mode-style bg=green

# Easy config reload
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."
# vi is good
setw -g mode-keys vi
# mouse behavior
setw -g mouse on

bind-key : command-prompt
bind-key r refresh-client
bind-key L clear-history

bind-key space next-window
bind-key bspace previous-window
bind-key enter next-layout

# use vim-like keys for splits and windows
bind-key v split-window -h
bind-key s split-window -v
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# smart pane switching with awareness of vim splits
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-l) || tmux select-pane -R"
bind C-l send-keys 'C-l'
bind-key C-o rotate-window

bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical

set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80
set-window-option -g display-panes-time 1500

bind-key a last-pane
bind-key q display-panes
bind-key c new-window
bind-key t next-window
bind-key T previous-window

set -s set-clipboard external
bind-key [ copy-mode
bind-key ] paste-buffer

# Note: pbcopy is a mac utility, which is used to send text to system clipboard. Clipboard on hpc seems to be restricted.
# Remove pbcopy for now otherwise it crashes mux server
# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-selection-and-cancel

# Set window notifications
setw -g monitor-activity on
set -g visual-activity on

# session selection
bind-key m run-shell "tmux list-sessions | awk -F: 'BEGIN {ORS=\" \"} {print \$1, NR, \"\\\"switch-client -t \" \$1 \"\\\"\"}' | xargs tmux display-menu -T 'active sessions'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Larger history buffer
set -g history-limit 50000

# Faster escape time (better for vim/neovim)
set -sg escape-time 10

# Focus events for vim/neovim autoread
set -g focus-events on

# Ensure clipboard-related env vars stay updated when attaching from GUI/remote sessions.
# (Important on Wayland/WSL, and when tmux server was started without DISPLAY.)
set -g update-environment "DISPLAY WAYLAND_DISPLAY XDG_RUNTIME_DIR WSL_DISTRO_NAME WSL_INTEROP SSH_AUTH_SOCK SSH_CONNECTION"

# Better colors
set -g default-terminal "tmux-256color"
set -sa terminal-features ',xterm-256color:RGB'
set -sa terminal-overrides ',xterm-256color:Tc'

# Pane base index (windows already set to 1 above)
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# CCB script directory
set -g @ccb_bin_dir "$HOME/.local/bin"

# Better scroll speed (2 lines per scroll instead of default 5)
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 2 scroll-down
